<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Library — Book Catalogue</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header>
      <img src="/book.svg" width="32" height="32" alt="" />
      <h1>The Library <small>Book Catalogue</small></h1>
    </header>

    <section class="hero">
      <h2>Discover Your Next Great Read</h2>
      <p>
        Search millions of books from Open Library. Save favorites to your shelf and pick them up anytime.
      </p>
      <div class="search-bar" role="search">
        <input
          type="search"
          id="searchInput"
          placeholder="Search for books by title or author..."
          autocomplete="off"
        />
        <button type="button" id="searchBtn">Search</button>
      </div>
    </section>

    <div class="main">
      <div id="results" aria-live="polite"></div>
      <aside id="favorites">
        <h3><span aria-hidden="true">❤️</span> Favorites</h3>
        <div id="favoritesList"></div>
      </aside>
    </div>

    <footer>
      <p>Powered by Open Library.</p>
    </footer>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
