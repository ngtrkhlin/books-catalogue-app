<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Book Catalogue</title>
  </head>
  <body>
    <header class="header">
      <div class="logo">
        <!-- src set by main.js so Vite hashes the asset in production -->
        <img id="headerLogo" src="" alt="logo" width="28" height="28" />
        <h1>Book Catalogue</h1>
      </div>
      <p class="subtitle">Your Reading Journey Begins Here</p>
      <!-- Theme toggle button — switches between light and dark mode -->
      <button id="themeBtn" class="theme-btn" aria-label="Toggle dark mode">🌙</button>
    </header>

    <section class="hero">
      <h2>Step Into Your Next Story</h2>
      <p>Browse thousands of books, save your favorites, and build your perfect library.</p>

      <div class="search-bar">
        <input id="searchInput" type="text" placeholder="Search for books by title, author, or keyword..." autocomplete="off" />
        <button id="searchBtn">Find</button>
      </div>

      <div class="filter-row">
        <label for="authorFilter">Filter by author</label>
        <select id="authorFilter" aria-label="Filter by author">
          <option value="all">All authors</option>
        </select>
      </div>
    </section>

    <div class="main">
      <div id="results" aria-live="polite"></div>
      <aside id="favorites">
        <h3>Favorites</h3>
        <div id="favoritesList"></div>
      </aside>
    </div>

    <footer>
      <p>Powered by Open Library</p>
    </footer>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
